# ---------------------------------------------------------------------------
# GNC Controller Config Settings
# ---------------------------------------------------------------------------

orbit:
  altitude: 420000.0    # [m]

lqr:
  Q_pos_along: 1.0            # Q -> State Penalty
  Q_pos_cross: 1.0
  Q_vel: 70.25
  R: 1.0                # R -> Control Penalty (thrust)

glideslope:
  k: 0.001
  corridor_angle: 0.0175  # [rad] Half angle
  min_range: 5.0          # [m]
  approach_axis: [0, 0, -1]  # V-bar

nav_filter:
  sensor:
    range_noise: 1.0    # 1-std [m]
    bearing_noise: 0.005  # 1-std [rad]
    update_rate: 1.0      # [Hz]
    max_range: 2000.0     # [m]
    min_range: 2.0        # [m]
  Q_process_pos: 0.001
  Q_process_vel: 0.0001
  R_meas_range: 1.0
  R_meas_bearing: 0.000025
  P0_pos: 100.0         # P0 -> Initial covariance matrix
  P0_el: 0.01

control:
  u_max: 0.01
  thrust_mag_sigma: 0.01  # 1-std [m/s^2]
  thrust_pointing_sigma: 0.005  # 1-std [rad]

sim:
  dt: 1.0                   # [s]
  timeout: 10000.0           # [s]
  success_range: 5.0
  success_velocity: 0.05

mc:
  n_threads: 0  # auto-detect 
  seed: 42
